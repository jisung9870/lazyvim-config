# True Color 지원
set -g default-terminal "screen-256color"
set -ga terminal-overrides ",xterm-256color:Tc"

# Mouse enable
set -g mouse on

# Rmove ESC delay
set -sg escape-time 0

# History Size Up
set -g history-limit 50000

# Start index 1 of Window/Panel 
set -g base-index 1
setw -g pane-base-index 1

# Window number auto sort
set -g renumber-windows on


# ====================
# Key Binding
# ====================

# Prefix Key: Ctrl+b -> Ctrl+a
#unbind C-b
#set -g prefix C-a
#bind C-a send-prefix

# Fast Reload - config file
bind r source-file ~/.tmux.conf \; display "Config reloaded!"

# Panel Splt
unbind '"'
unbind %
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# create current path of new window
bind c new-window -c "#{pane_current_path}"

# ====================
#
# ====================

# Move Panel
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Adjust panel size
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Vim mode enable
setw -g mode-keys vi

# Copy mode - vi style
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-selection-and-cancel

# 현재 세션 제외하고 모두 제거
bind X confirm-before -p "Kill all other sessions? (y/n)" "kill-session -a"

# tmux 서버 완전 종료 (모든 세션 제거)
bind Q confirm-before -p "Kill tmux server? (y/n)" "kill-server"

# =============================================================================
# Clipboard integration
# =============================================================================
# 시스템 클립보드 사용 (tmux 3.2+)
set -s set-clipboard on
set -as terminal-features ',*:clipboard'

# 복사 모드 키바인딩
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy"
bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "pbcopy"

# 붙여넣기
bind P paste-buffer


# =============================================================================
# Tmux Plugin Manager (TPM)
# =============================================================================

# Plugin list
### base
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'

set -g @plugin 'catppuccin/tmux#v2.1.3'
set -g @plugin 'tmux-plugins/tmux-cpu'
set -g @plugin 'tmux-plugins/tmux-battery'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'christoomey/vim-tmux-navigator'

# Resurrect setting
set -g @resurrect-capture-pane-contents 'on'
set -g @resurrect-strategy-nvim 'session'

# Continumm setting
set -g @continuum-restore 'off'
set -g @continuum-save-interval '15'

### Resource Monitoirng
set -g @cpu_percentage_format "%3.0f%%"
set -g @ram_percentage_format "%3.0f%%"

### Bettery 
set -g @batt_icon_status_charged '🔋'
set -g @batt_icon_status_charging '⚡'
set -g @batt_icon_status_discharging '🔋'

# =============================================================================
# Catppuccin thema setting
# =============================================================================
#
set -g @catppuccin_flavor 'mocha'
set -g @catppuccin_window_status_style "rounded"

# 상태바 길이
set -g status-right-length 150
set -g status-left-length 100
set -g status-left ""

# 상태바 구성 (모든 모듈에 -agF 사용)
set -g status-right "#{E:@catppuccin_status_directory}"
set -agF status-right "#{E:@catppuccin_status_cpu}"
set -agF status-right "#{E:@catppuccin_status_battery}"
set -agF status-right "#{E:@catppuccin_status_session}"
set -agF status-right "#{E:@catppuccin_status_user}"

# =============================================================================
# Session Manager
# =============================================================================

# List Session
bind s choose-tree -Zs
bind '$' command-prompt -I "#S" "rename-session '%%'"
bind N command-prompt -p "New session name:" "new-session -s '%%'"

bind -r '(' switch-client -p
bind -r ')' switch-client -n

bind f run-shell "tmux neww ~/bin/tmux-sessionizer"

# =============================================================================
# TPM init - *Must be in the bottom row*
# =============================================================================
run '~/.tmux/plugins/tpm/tpm'

