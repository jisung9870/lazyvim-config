name: Setup scripts

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  shell:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install shell tools
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck
          go install mvdan.cc/sh/v3/cmd/shfmt@latest

      - name: Bash syntax
        run: bash -n scripts/setup-macos.sh scripts/setup-wsl.sh scripts/lib/setup-common.sh scripts/lib/setup-versions.sh scripts/test-setup.sh

      - name: ShellCheck
        run: shellcheck scripts/setup-macos.sh scripts/setup-wsl.sh scripts/lib/setup-common.sh scripts/lib/setup-versions.sh scripts/test-setup.sh

      - name: shfmt
        run: shfmt -d -i 2 -ci scripts/setup-macos.sh scripts/setup-wsl.sh scripts/lib/setup-common.sh scripts/lib/setup-versions.sh scripts/test-setup.sh
